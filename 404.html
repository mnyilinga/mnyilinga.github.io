<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | Mnyilinga News</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0e0e0e;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.container{
max-width:600px;
animation:fadeIn 1s ease;
}

.logo{
font-size:14px;
letter-spacing:3px;
margin-bottom:30px;
color:#aaa;
}

.error{
font-size:120px;
font-weight:900;
line-height:1;
background:linear-gradient(45deg,#ffffff,#999999);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.title{
font-size:26px;
margin-top:10px;
margin-bottom:15px;
}

.desc{
color:#bbb;
line-height:1.6;
margin-bottom:35px;
}

.actions{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
padding:12px 24px;
text-decoration:none;
border-radius:6px;
font-size:14px;
transition:0.25s;
}

.home{
background:white;
color:black;
}

.home:hover{
background:#ddd;
}

.news{
border:1px solid #444;
color:#ccc;
}

.news:hover{
background:#1a1a1a;
border-color:#777;
}

.countdown{
margin-top:30px;
font-size:13px;
color:#888;
}

.progress{
margin-top:12px;
height:3px;
background:#222;
border-radius:3px;
overflow:hidden;
}

.bar{
height:100%;
width:100%;
background:white;
animation:load 6s linear forwards;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes load{
from{
width:100%;
}
to{
width:0%;
}
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
MNYILINGA NEWS
</div>

<div class="error">
404
</div>

<div class="title">
Page Not Found
</div>

<div class="desc">
It appears that the page you tried to access does not exist on our website.
You will be redirected to the homepage shortly.
</div>

<div class="actions">

<a href="/" class="btn home">
Return Home
</a>

<a href="/news" class="btn news">
Browse News
</a>

</div>

<div class="countdown">
Redirecting automatically...
</div>

<div class="progress">
<div class="bar"></div>
</div>

</div>

<script>

setTimeout(function(){
window.location.href="/";
},6000)

</script>

</body>
</html>
