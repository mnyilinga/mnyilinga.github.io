<head>

<title>404 - Ukurasa Haupo</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#8B0000,#ff0000);
color:white;
text-align:center;
}

.container{
background:rgba(0,0,0,0.35);
padding:60px;
border-radius:20px;
backdrop-filter: blur(10px);
box-shadow:0 20px 40px rgba(0,0,0,0.4);
max-width:500px;
width:90%;
animation:fadeIn 1s ease;
}

h1{
font-size:120px;
margin-bottom:10px;
letter-spacing:5px;
}

h2{
font-size:28px;
margin-bottom:15px;
}

p{
font-size:16px;
opacity:0.9;
margin-bottom:30px;
}

a{
display:inline-block;
padding:14px 30px;
background:white;
color:#c40000;
text-decoration:none;
border-radius:50px;
font-weight:bold;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

a:hover{
transform:scale(1.05);
background:#111;
color:white;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>
