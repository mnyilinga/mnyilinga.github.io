<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mnyilinga News Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #050507;
            --bg1: #0b0b10;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-2: rgba(255, 255, 255, 0.045);
            --stroke: rgba(255, 255, 255, 0.12);
            --stroke-2: rgba(255, 255, 255, 0.16);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.70);
            --muted-2: rgba(255, 255, 255, 0.58);
            --primary: #dc2626;   /* brand red */
            --primary-2: #ffffff; /* brand white */
            --ok: #22c55e;
            --warn: #fbbf24;
            --shadow: 0 0 0 rgba(0, 0, 0, 0);
            --shadow-soft: 0 0 0 rgba(0, 0, 0, 0);
            --radius-xl: 18px;
            --radius-lg: 16px;
            --radius-md: 14px;
            --radius-sm: 12px;
            --ring: 0 0 0 3px rgba(220, 38, 38, 0.22);
            color-scheme: dark;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
              radial-gradient(900px 620px at 20% 8%, rgba(220, 38, 38, 0.38), transparent 58%),
              radial-gradient(900px 620px at 82% 22%, rgba(220, 38, 38, 0.22), transparent 60%),
              linear-gradient(180deg, #000000, #0b0b10);
            color: var(--text);
            padding: 12px;
            line-height: 1.5;
            min-height: 100svh;
            overflow-x: hidden;
        }

        /* stop selecting UI text */
        body, * { user-select: none; -webkit-user-select: none; -ms-user-select: none; }
        input, textarea { user-select: text; -webkit-user-select: text; -ms-user-select: text; }

        a { color: inherit; text-decoration: none; }
        button, input, textarea { font-family: inherit; }
        ::selection { background: rgba(124, 58, 237, 0.35); }

        .app {
            max-width: 720px;
            margin: 0 auto;
            display: block;
        }

        .glass {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--stroke);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .brandbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 14px 14px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--stroke);
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }
        .brandname {
            font-size: 15px;
            font-weight: 950;
            letter-spacing: 0.2px;
            color: rgba(255,255,255,0.94);
        }
        .brandbadge {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 8px 10px;
            border-radius: 999px;
            border: 1px solid rgba(220,38,38,0.35);
            background: rgba(220,38,38,0.10);
            color: rgba(255,255,255,0.88);
            white-space: nowrap;
        }
        /* (brand text removed — logo only) */

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
            display: inline-grid;
            place-items: center;
            cursor: pointer;
            transition: transform .14s ease, background .14s ease, border-color .14s ease;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.09); border-color: rgba(255, 255, 255, 0.20); }
        .icon-btn:active { transform: translateY(1px) scale(0.99); }

        .main {
            margin-top: 10px;
            padding: 10px;
        }

        .grid {
            display: block;
        }

        .card {
            padding: 10px;
        }
        .card h3 {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.86);
            margin-bottom: 12px;
        }

        /* -------- Form / Fields -------- */
        .field-group { margin-bottom: 14px; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 11px; 
            font-weight: 900; 
            letter-spacing: 0.18em;
            color: rgba(255,255,255,0.82);
            text-transform: uppercase;
        }

        /* -------- Advanced Upload -------- */
        .upload-zone {
            width: 100%;
            height: 160px;
            border: 1.5px dashed rgba(255,255,255,0.24);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background:
              radial-gradient(380px 220px at 20% 15%, rgba(124,58,237,0.22), transparent 62%),
              radial-gradient(320px 200px at 78% 25%, rgba(34,211,238,0.18), transparent 62%),
              rgba(255,255,255,0.06);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform .15s ease, border-color .15s ease, background .15s ease;
        }

        .upload-zone:hover { border-color: rgba(124,58,237,0.55); transform: translateY(-1px); }
        .upload-zone:active { transform: translateY(0px); }

        .upload-zone svg { width: 44px; stroke: rgba(255,255,255,0.9); margin-bottom: 10px; filter: drop-shadow(0 18px 22px rgba(0,0,0,0.35)); }
        .upload-zone span { font-size: 14px; font-weight: 750; color: rgba(255,255,255,0.88); }
        .upload-zone small { margin-top: 6px; font-size: 12px; font-weight: 650; color: rgba(255,255,255,0.60); }

        #preview-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
        }

        /* -------- Radio Category Section -------- */
        .category-trigger {
            width: 100%;
            padding: 14px 14px;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: var(--radius-md);
            background: rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 800;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            transition: box-shadow .15s ease, border-color .15s ease, transform .15s ease, background .15s ease;
        }
        .category-trigger:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.22); }
        .category-trigger:active { transform: translateY(1px); }
        .category-trigger:focus-within { box-shadow: var(--ring); }

        .category-list {
            margin-top: 8px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: none; /* Hide by default */
            background: rgba(10, 12, 24, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .category-list.show { display: block; }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 13px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.10);
            cursor: pointer;
            transition: background 0.14s ease;
        }

        .radio-option:last-child { border-bottom: none; }
        .radio-option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.22);
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
            background: rgba(255,255,255,0.03);
        }

        .radio-option input[type="radio"]:checked {
            border-color: rgba(220,38,38,0.95);
            background: linear-gradient(135deg, rgba(220,38,38,0.98), rgba(255,255,255,0.90));
        }

        .radio-option input[type="radio"]:checked::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .radio-option:hover { background: rgba(255,255,255,0.07); }
        .radio-option span { font-size: 14px; font-weight: 750; color: rgba(255,255,255,0.90); }

        /* -------- Inputs -------- */
        input[type="text"], textarea {
            width: 100%;
            padding: 14px 14px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.16);
            font-family: inherit;
            font-size: 14px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.92);
            font-weight: 650;
            transition: box-shadow .15s ease, border-color .15s ease, background .15s ease;
        }
        input[type="text"]::placeholder, textarea::placeholder { color: rgba(255,255,255,0.56); font-weight: 650; }

        input:focus, textarea:focus {
            outline: none;
            border-color: rgba(220,38,38,0.55);
            box-shadow: var(--ring);
            background: rgba(255,255,255,0.08);
        }

        textarea { min-height: 180px; resize: vertical; }

        /* -------- Verification -------- */
        .verify-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 14px 0 10px;
            font-size: 14px;
            font-weight: 750;
            color: rgba(255,255,255,0.88);
            padding: 12px 12px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.05);
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary-2);
        }

        /* -------- Action Button -------- */
        .publish-btn {
            width: 100%;
            background:
              radial-gradient(120px 120px at 20% 25%, rgba(255,255,255,0.16), transparent 55%),
              linear-gradient(135deg, rgba(220,38,38,0.98), rgba(0,0,0,0.96));
            color: rgba(255,255,255,0.98);
            padding: 16px 16px;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 18px;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease, opacity 0.16s ease;
            cursor: pointer;
        }
        .publish-btn:hover { filter: brightness(1.05) saturate(1.05); transform: translateY(-1px); }
        .publish-btn:active { transform: translateY(0px); }

        .publish-btn:disabled { opacity: 0.55; filter: grayscale(0.2); cursor: not-allowed; transform: none; box-shadow: none; }

        #status-msg {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 850;
            color: rgba(255,255,255,0.88);
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(0,0,0,0.18);
            display: none;
        }

        #file-input { display: none; }

        /* -------- Responsive -------- */
        @media (max-width: 560px) {
            body { padding: 10px; }
            textarea { min-height: 200px; }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="brandbar" aria-label="Brand bar">
        <div class="brandname">Mnyilinga Digital</div>
        <div class="brandbadge">Admin Panel</div>
    </header>

    <main class="main glass" aria-label="Main content">
        <section class="grid" aria-label="Create post">
            <section class="card" id="create" aria-label="Create post">
                <h3>Create / Upload</h3>

                <div class="field-group">
                    <label>Cover Image</label>
                    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('file-input').click()">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                        <span>Bonyeza ili kupakia picha</span>
                        <small>PNG/JPG • Max: inategemea device</small>
                        <img id="preview-img" src="#" alt="Preview">
                    </div>
                    <input type="file" id="file-input" accept="image/*">
                </div>

                <div class="field-group">
                    <label>News Categories</label>
                    <div class="category-trigger" id="catTrigger" role="button" tabindex="0" aria-expanded="false" aria-controls="catList">
                        <span id="catSelected">Chagua category...</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                    <div class="category-list" id="catList" role="listbox" aria-label="Category list">
                        <label class="radio-option">
                            <input type="radio" name="category" value="Mahusiano">
                            <span>Mahusiano</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Siasa">
                            <span>Siasa</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Technology">
                            <span>Technology</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Mapenzi">
                            <span>Mapenzi</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Trending">
                            <span>Trending</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Fashion">
                            <span>Fashion</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Biashara">
                            <span>Biashara</span>
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="category" value="Michezo">
                            <span>Michezo</span>
                        </label>
                    </div>
                </div>

                <div class="field-group">
                    <label>Headline</label>
                    <input type="text" id="headline" placeholder="Andika kichwa hapa...">
                </div>

                <div class="field-group">
                    <label>Article</label>
                    <textarea id="article" placeholder="Andika maelezo yote hapa..."></textarea>
                </div>

                <label class="verify-box">
                    <input type="checkbox" id="verify">
                    <span>Nimehakiki habari ni sahihi</span>
                </label>

                <button class="publish-btn" id="submitBtn" disabled onclick="handlePublish()">
                    Push This Post
                </button>

                <div id="status-msg">Inapakia... Tafadhali subiri</div>
            </section>
        </section>
    </main>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const catTrigger = document.getElementById('catTrigger');
    const catList = document.getElementById('catList');
    const catSelected = document.getElementById('catSelected');
    const radios = document.querySelectorAll('input[name="category"]');
    const submitBtn = document.getElementById('submitBtn');
    const verifyCheckbox = document.getElementById('verify');
    const statusMsg = document.getElementById('status-msg');

    // Handle Image Preview
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (re) => { 
                previewImg.src = re.target.result; 
                previewImg.style.display = 'block'; 
            };
            reader.readAsDataURL(file);
        }
    };

    // Toggle Category List
    function setCatOpen(open) {
        catList.classList.toggle('show', open);
        catTrigger.setAttribute('aria-expanded', String(open));
    }
    catTrigger.onclick = () => setCatOpen(!catList.classList.contains('show'));
    catTrigger.onkeydown = (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            setCatOpen(!catList.classList.contains('show'));
        }
        if (e.key === 'Escape') setCatOpen(false);
    };
    document.addEventListener('click', (e) => {
        if (!catList.classList.contains('show')) return;
        if (catTrigger.contains(e.target) || catList.contains(e.target)) return;
        setCatOpen(false);
    });

    // Radio Selection and Automatic Hide
    radios.forEach(radio => {
        radio.onclick = () => {
            catSelected.innerText = radio.value;
            setCatOpen(false); // Hides the list after selection
            catTrigger.style.borderColor = "rgba(34,211,238,0.60)";
        };
    });

    // Enable Publish Button
    verifyCheckbox.onchange = () => submitBtn.disabled = !verifyCheckbox.checked;

    async function handlePublish() {
        // Hapa unatumia zile URL zako za awali (ImgBB na Google Script)
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxRU38CN-Xnu7FOokZ7bzKXrxljegpDtpUPmRWCm06zBDEFfUl0ftbOlNUUNX_nAs5u/exec';
        const IMGBB_KEY = '65bd20fae1600fa1dad6725e9bda';

        const file = fileInput.files[0];
        const category = catSelected.innerText;
        const headlineText = document.getElementById('headline').value;
        const articleText = document.getElementById('article').value;

        if(!file || headlineText.trim() === "" || category === "Chagua category...") {
            alert("Tafadhali kamilisha fomu!"); return;
        }

        submitBtn.disabled = true;
        statusMsg.style.display = 'block';

        try {
            // Upload to ImgBB
            let fd = new FormData();
            fd.append("image", file);
            let imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
            let imgData = await imgRes.json();
            
            // Post to Google Sheets
            await fetch(GOOGLE_URL, {
                method:"POST", 
                mode:"no-cors", 
                body: JSON.stringify({
                    "picha_url": imgData.data.url,
                    "category": category,
                    "headline": headlineText,
                    "article": articleText
                })
            });
            alert("Habari imetumwa!");
            location.reload();
        } catch(e) {
            alert("Hitilafu imetokea!");
            submitBtn.disabled = false;
            statusMsg.style.display = 'none';
        }
    }

</script>
</body>
</html>
