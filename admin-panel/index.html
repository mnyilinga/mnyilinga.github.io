<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnyilinga News | Professional Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #0f172a; /* Navy Dark */
            --brand-accent: #2563eb;  /* Electric Blue */
            --brand-success: #059669;
            --surface-bg: #f8fafc;
            --card-white: #ffffff;
            --border-color: #e2e8f0;
            --text-title: #0f172a;
            --text-body: #475569;
            --input-focus: #dbeafe;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--surface-bg);
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-body);
        }

        .admin-card {
            width: 100%;
            max-width: 680px;
            background: var(--card-white);
            border-radius: 20px;
            padding: 48px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .header-section h2 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-title);
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .header-section p {
            font-size: 14px;
            color: var(--text-body);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        /* -------- Advanced Upload Area -------- */
        .upload-container {
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fafafa;
        }

        .drop-zone:hover, .drop-zone.active {
            border-color: var(--brand-accent);
            background: #f0f7ff;
        }

        .upload-svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            stroke: var(--brand-accent);
        }

        .upload-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-title);
        }

        .upload-text span {
            color: var(--brand-accent);
            text-decoration: underline;
            font-weight: 600;
        }

        #preview-img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            display: none;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
        }

        /* -------- Custom Inputs -------- */
        .form-row { margin-bottom: 24px; position: relative; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--text-title);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"], textarea, .select-display {
            width: 100%;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1.5px solid var(--border-color);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: #fff;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--brand-accent);
            background: #fff;
            box-shadow: 0 0 0 4px var(--input-focus);
        }

        textarea { min-height: 140px; line-height: 1.6; resize: none; }

        /* -------- Clean Dropdown -------- */
        .custom-select { position: relative; cursor: pointer; }
        .select-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            max-height: 0;
            overflow: hidden;
            z-index: 100;
            transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .custom-select.active .dropdown-menu { max-height: 260px; padding: 10px 0; }

        .menu-item {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
        }

        .menu-item:hover {
            background: var(--brand-accent);
            color: #fff;
        }

        /* -------- Checkbox UI -------- */
        .check-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 32px 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            position: relative;
            transition: 0.2s;
            flex-shrink: 0;
        }

        input:checked ~ .custom-checkbox {
            background: var(--brand-accent);
            border-color: var(--brand-accent);
        }

        .custom-checkbox::after {
            content: '';
            position: absolute;
            left: 6px; top: 2px;
            width: 5px; height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            display: none;
        }

        input:checked ~ .custom-checkbox::after { display: block; }

        /* -------- Submit Button -------- */
        .submit-btn {
            width: 100%;
            background: var(--brand-primary);
            color: #fff;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            background: #1e293b;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }

        #loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--brand-accent);
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header-section">
        <h2>Mnyilinga News</h2>
        <p>Console ya Usimamizi</p>
    </div>

    <div class="upload-container">
        <label>Picha ya Habari</label>
        <div class="drop-zone" id="drop-area">
            <svg class="upload-svg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            <p class="upload-text">Drag picha hapa au <span id="browse-btn">tafuta kwenye faili</span></p>
            <img id="preview-img" src="#" alt="Preview">
            <input type="file" id="file-input" accept="image/*">
        </div>
    </div>

    <div class="form-row">
        <label>Kundi la Habari</label>
        <div class="custom-select" id="dropdown">
            <div class="select-display">
                <span id="selected-text">Chagua Jamii ya Habari...</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <div class="dropdown-menu">
                <div class="menu-item" data-value="Michezo">Michezo</div>
                <div class="menu-item" data-value="Siasa">Siasa</div>
                <div class="menu-item" data-value="Teknolojia">Teknolojia</div>
                <div class="menu-item" data-value="Biashara">Biashara</div>
                <div class="menu-item" data-value="Burudani">Burudani</div>
                <div class="menu-item" data-value="Afya">Afya</div>
            </div>
        </div>
    </div>

    <div class="form-row">
        <label>Kichwa cha Habari</label>
        <input type="text" id="newsHeadline" placeholder="Andika kichwa cha habari kwa ufupi...">
    </div>

    <div class="form-row">
        <label>Habari Kamili</label>
        <textarea id="newsArticle" placeholder="Andika maelezo yote ya habari hapa..."></textarea>
    </div>

    <label class="check-container">
        <input type="checkbox" id="termsCheckbox" style="display:none">
        <div class="custom-checkbox"></div>
        <span>Nimehakiki kuwa taarifa hizi ni sahihi</span>
    </label>

    <button class="submit-btn" id="postBtn" disabled onclick="submitNews()">
        PUBLISH ARTICLE
    </button>
    <div id="loader">Processing... Tunatuma habari kwenye mfumo</div>
</div>

<script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('file-input');
    const browseBtn = document.getElementById('browse-btn');
    const previewImg = document.getElementById('preview-img');
    const dropdown = document.getElementById('dropdown');
    const selectedText = document.getElementById('selected-text');
    const menuItems = document.querySelectorAll('.menu-item');
    const postBtn = document.getElementById('postBtn');
    const termsCheckbox = document.getElementById('termsCheckbox');

    // Upload functionality
    browseBtn.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    dropArea.ondragover = (e) => { e.preventDefault(); dropArea.classList.add('active'); };
    dropArea.ondragleave = () => dropArea.classList.remove('active');
    dropArea.ondrop = (e) => { e.preventDefault(); dropArea.classList.remove('active'); handleFile(e.dataTransfer.files[0]); };

    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => { previewImg.src = e.target.result; previewImg.style.display = 'block'; };
            reader.readAsDataURL(file);
        }
    }

    // Dropdown toggle
    dropdown.onclick = () => dropdown.classList.toggle('active');
    menuItems.forEach(item => {
        item.onclick = (e) => {
            selectedText.innerText = e.target.getAttribute('data-value');
            dropdown.classList.remove('active');
        };
    });

    window.onclick = (e) => { if (!dropdown.contains(e.target)) dropdown.classList.remove('active'); };

    // Enable button
    termsCheckbox.onchange = () => postBtn.disabled = !termsCheckbox.checked;

    // Submission logic
    async function submitNews() {
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRU38CN-Xnu7FOokZ7bzKXrxljegpDtpUPmRWCm06zBDEFfUl0ftbOlNUUNX_nAs5u/exec';
        const IMGBB_API_KEY = '65bd20fae1600fa1dad6725e9bda';

        const file = fileInput.files[0];
        const category = selectedText.innerText;
        const headline = document.getElementById('newsHeadline').value;
        const article = document.getElementById('newsArticle').value;

        if(!file || headline === "" || category === "Chagua Jamii ya Habari...") {
            alert("Tafadhali kamilisha sehemu zote!");
            return;
        }

        postBtn.disabled = true;
        document.getElementById('loader').style.display = 'block';

        try {
            let formData = new FormData();
            formData.append("image", file);
            let imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {method:"POST", body:formData});
            let imgData = await imgRes.json();
            
            await fetch(GOOGLE_SCRIPT_URL, {
                method:"POST", 
                mode:"no-cors", 
                body: JSON.stringify({
                    "picha_url": imgData.data.url,
                    "category": category,
                    "headline": headline,
                    "article": article
                })
            });
            alert("Habari imechapishwa kikamilifu!");
            location.reload();
        } catch(e) {
            alert("Hitilafu imetokea. Jaribu tena.");
            postBtn.disabled = false;
        }
    }
</script>
</body>
</html>
