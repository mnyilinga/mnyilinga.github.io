<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mnyilinga News Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --gray-light: #f1f5f9;
            --border: #e2e8f0;
            --text-main: #1e293b;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            color: var(--text-main);
            padding: 20px;
            line-height: 1.5;
        }

        header {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        header h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--dark);
        }

        header p {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* -------- Advanced Upload -------- */
        .field-group { margin-bottom: 25px; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 13px; 
            font-weight: 700; 
            color: var(--dark);
            text-transform: uppercase;
        }

        .upload-zone {
            width: 100%;
            height: 160px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--gray-light);
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .upload-zone svg { width: 40px; stroke: var(--primary); margin-bottom: 10px; }
        .upload-zone span { font-size: 14px; font-weight: 500; }

        #preview-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            z-index: 5;
        }

        /* -------- Radio Category Section -------- */
        .category-trigger {
            width: 100%;
            padding: 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 15px;
        }

        .category-list {
            margin-top: 8px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            display: none; /* Hide by default */
        }

        .category-list.show { display: block; }

        .radio-option {
            display: flex;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.2s;
        }

        .radio-option:last-child { border-bottom: none; }
        .radio-option input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-radius: 50%;
            margin-right: 12px;
            position: relative;
        }

        .radio-option input[type="radio"]:checked {
            border-color: var(--primary);
            background: var(--primary);
        }

        .radio-option input[type="radio"]:checked::after {
            content: '';
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .radio-option span { font-size: 15px; font-weight: 500; }

        /* -------- Inputs -------- */
        input[type="text"], textarea {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            font-family: inherit;
            font-size: 15px;
            background: #fff;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea { min-height: 150px; resize: none; }

        /* -------- Verification -------- */
        .verify-box {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        /* -------- Action Button -------- */
        .publish-btn {
            width: 100%;
            background: var(--dark);
            color: #fff;
            padding: 20px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .publish-btn:disabled { background: #cbd5e1; }

        #status-msg {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        #file-input { display: none; }
    </style>
</head>
<body>

<header>
    <h2>Mnyilinga News</h2>
    <p>Mobile Dashboard</p>
</header>

<div class="field-group">
    <label>Picha Kuu</label>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
        <span>Gusa hapa kuweka picha</span>
        <img id="preview-img" src="#" alt="Preview">
    </div>
    <input type="file" id="file-input" accept="image/*">
</div>

<div class="field-group">
    <label>Jamii ya Habari</label>
    <div class="category-trigger" id="catTrigger">
        <span id="catSelected">Chagua jamii...</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="category-list" id="catList">
        <label class="radio-option">
            <input type="radio" name="category" value="Michezo">
            <span>Michezo</span>
        </label>
        <label class="radio-option">
            <input type="radio" name="category" value="Siasa">
            <span>Siasa</span>
        </label>
        <label class="radio-option">
            <input type="radio" name="category" value="Teknolojia">
            <span>Teknolojia</span>
        </label>
        <label class="radio-option">
            <input type="radio" name="category" value="Afya">
            <span>Afya</span>
        </label>
        <label class="radio-option">
            <input type="radio" name="category" value="Biashara">
            <span>Biashara</span>
        </label>
    </div>
</div>

<div class="field-group">
    <label>Kichwa cha Habari</label>
    <input type="text" id="headline" placeholder="Andika kichwa hapa...">
</div>

<div class="field-group">
    <label>Maelezo ya Habari</label>
    <textarea id="article" placeholder="Andika maelezo yote hapa..."></textarea>
</div>

<label class="verify-box">
    <input type="checkbox" id="verify">
    <span>Nimehakiki habari ni sahihi</span>
</label>

<button class="publish-btn" id="submitBtn" disabled onclick="handlePublish()">
    TUMA HABARI
</button>

<div id="status-msg">Inasindika... Tafadhali subiri</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const catTrigger = document.getElementById('catTrigger');
    const catList = document.getElementById('catList');
    const catSelected = document.getElementById('catSelected');
    const radios = document.querySelectorAll('input[name="category"]');
    const submitBtn = document.getElementById('submitBtn');
    const verifyCheckbox = document.getElementById('verify');

    // Handle Image Preview
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (re) => { 
                previewImg.src = re.target.result; 
                previewImg.style.display = 'block'; 
            };
            reader.readAsDataURL(file);
        }
    };

    // Toggle Category List
    catTrigger.onclick = () => catList.classList.toggle('show');

    // Radio Selection and Automatic Hide
    radios.forEach(radio => {
        radio.onclick = () => {
            catSelected.innerText = radio.value;
            catList.classList.remove('show'); // Hides the list after selection
            catTrigger.style.borderColor = "var(--primary)";
        };
    });

    // Enable Publish Button
    verifyCheckbox.onchange = () => submitBtn.disabled = !verifyCheckbox.checked;

    async function handlePublish() {
        // Hapa unatumia zile URL zako za awali (ImgBB na Google Script)
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxRU38CN-Xnu7FOokZ7bzKXrxljegpDtpUPmRWCm06zBDEFfUl0ftbOlNUUNX_nAs5u/exec';
        const IMGBB_KEY = '65bd20fae1600fa1dad6725e9bda';

        const file = fileInput.files[0];
        const category = catSelected.innerText;
        const headlineText = document.getElementById('headline').value;
        const articleText = document.getElementById('article').value;

        if(!file || headlineText === "" || category === "Chagua jamii...") {
            alert("Tafadhali kamilisha fomu!"); return;
        }

        submitBtn.disabled = true;
        document.getElementById('status-msg').style.display = 'block';

        try {
            // Upload to ImgBB
            let fd = new FormData();
            fd.append("image", file);
            let imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
            let imgData = await imgRes.json();
            
            // Post to Google Sheets
            await fetch(GOOGLE_URL, {
                method:"POST", 
                mode:"no-cors", 
                body: JSON.stringify({
                    "picha_url": imgData.data.url,
                    "category": category,
                    "headline": headlineText,
                    "article": articleText
                })
            });
            alert("Habari imetumwa!");
            location.reload();
        } catch(e) {
            alert("Hitilafu imetokea!");
            submitBtn.disabled = false;
        }
    }
</script>
</body>
</html>
