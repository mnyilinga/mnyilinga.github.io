<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnyilinga News Portal | Dashboard</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #059669;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 { color: #1e293b; text-align: center; margin-top: 0; }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: #334155; }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .image-preview-box {
            width: 100%;
            height: 200px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
            cursor: pointer;
        }

        #previewImg { width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-post {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-post:hover { background: #1d4ed8; }
        .btn-post:disabled { background: #94a3b8; cursor: not-allowed; }

        #loader { display: none; text-align: center; margin-top: 15px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>Mnyilinga News Admin</h2>
    
    <div class="form-group">
        <label>Picha ya Habari</label>
        <div class="image-preview-box" onclick="document.getElementById('imageInput').click()">
            <span id="placeholderTxt">Bonyeza hapa kuchagua picha</span>
            <img id="previewImg">
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
    </div>

    <div class="form-group">
        <label>Jamii ya Habari (Category)</label>
        <select id="newsCategory">
            <option value="Siasa">Siasa</option>
            <option value="Michezo">Michezo</option>
            <option value="Burudani">Burudani</option>
            <option value="Teknolojia">Teknolojia</option>
            <option value="Uchumi">Uchumi</option>
        </select>
    </div>

    <div class="form-group">
        <label>Kichwa cha Habari (Headline)</label>
        <input type="text" id="newsHeadline" placeholder="Andika kichwa cha habari hapa...">
    </div>

    <div class="form-group">
        <label>Habari Kamili (Article Body)</label>
        <textarea id="newsArticle" rows="8" placeholder="Andika habari yako yote hapa..."></textarea>
    </div>

    <button class="btn-post" id="postBtn" onclick="submitNews()">Chapisha Habari Sasa</button>
    <div id="loader">Inatuma habari... Tafadhali subiri.</div>
</div>

<script>
    const imageInput = document.getElementById('imageInput');
    const previewImg = document.getElementById('previewImg');
    const placeholderTxt = document.getElementById('placeholderTxt');
    const postBtn = document.getElementById('postBtn');
    const loader = document.getElementById('loader');

    // Link yako ya Google na ImgBB
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRU38CN-Xnu7FOokZ7bzKXrxljegpDtpUPmRWCm06zBDEFfUl0ftbOlNUUNX_nAs5u/exec';
    const IMGBB_API_KEY = '65bd20fae1600fa1dad6725e9bda2c7a';

    // Onyesha picha pindi inapochaguliwa
    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
                placeholderTxt.style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    async function submitNews() {
        const file = imageInput.files[0];
        const category = document.getElementById('newsCategory').value;
        const headline = document.getElementById('newsHeadline').value;
        const article = document.getElementById('newsArticle').value;

        if (!file || !headline || !article) {
            alert("Tafadhali jaza sehemu zote na chagua picha!");
            return;
        }

        // Anza kuonyesha loader
        postBtn.disabled = true;
        loader.style.display = 'block';
        loader.innerText = "🚀 Inapakia picha ImgBB...";

        try {
            // 1. Upload Picha kwenda ImgBB
            let formData = new FormData();
            formData.append("image", file);

            let imgbbResponse = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            let imgbbData = await imgbbResponse.json();
            let imageUrl = imgbbData.data.url;

            loader.innerText = "✅ Picha imekubaliwa! Inahifadhi kwenye Google Sheets...";

            // 2. Tuma data zote Google Sheets
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // Muhimu kwa Google Apps Script
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    "picha_url": imageUrl,
                    "category": category,
                    "headline": headline,
                    "article": article
                })
            });

            // 3. Mafanikio
            alert("🎊 Hongera! Habari imechapishwa kikamilifu.");
            location.reload(); // Refresh fomu iwe wazi tena

        } catch (error) {
            console.error("Error:", error);
            alert("Oops! Hitilafu imetokea. Jaribu tena.");
        } finally {
            postBtn.disabled = false;
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
