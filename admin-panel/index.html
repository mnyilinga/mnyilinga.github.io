<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mnyilinga News Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg0: #050507;
            --bg1: #0b0b10;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-2: rgba(255, 255, 255, 0.045);
            --stroke: rgba(255, 255, 255, 0.12);
            --stroke-2: rgba(255, 255, 255, 0.16);
            --text: rgba(255, 255, 255, 0.92);
            --muted: rgba(255, 255, 255, 0.70);
            --muted-2: rgba(255, 255, 255, 0.58);
            --primary: #dc2626;   /* brand red */
            --primary-2: #ffffff; /* brand white */
            --ok: #22c55e;
            --warn: #fbbf24;
            --radius-xl: 18px;
            --radius-lg: 16px;
            --radius-md: 14px;
            --radius-sm: 12px;
            --ring: 0 0 0 3px rgba(220, 38, 38, 0.22);
            color-scheme: dark;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background:
              radial-gradient(900px 620px at 20% 8%, rgba(220, 38, 38, 0.38), transparent 58%),
              radial-gradient(900px 620px at 82% 22%, rgba(220, 38, 38, 0.22), transparent 60%),
              linear-gradient(180deg, #000000, #0b0b10);
            color: var(--text);
            padding: 12px;
            line-height: 1.5;
            min-height: 100svh;
            overflow-x: hidden;
        }

        body, * { user-select: none; -webkit-user-select: none; }
        input, textarea { user-select: text; -webkit-user-select: text; }

        .app { max-width: 720px; margin: 0 auto; display: block; }

        .glass {
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            border: 1px solid var(--stroke);
            border-radius: var(--radius-xl);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .brandbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--stroke);
            background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.04));
            margin-bottom: 10px;
        }
        .brandname { font-size: 15px; font-weight: 950; color: rgba(255,255,255,0.94); }
        .brandbadge {
            font-size: 11px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase;
            padding: 8px 10px; border-radius: 999px; border: 1px solid rgba(220,38,38,0.35);
            background: rgba(220,38,38,0.10); color: rgba(255,255,255,0.88);
        }

        .main { padding: 10px; }
        .card h3 {
            font-size: 14px; font-weight: 900; letter-spacing: 0.12em;
            text-transform: uppercase; color: rgba(255,255,255,0.86); margin-bottom: 12px;
        }

        .field-group { margin-bottom: 14px; }
        label { 
            display: block; margin-bottom: 10px; font-size: 11px; font-weight: 900; 
            letter-spacing: 0.18em; color: rgba(255,255,255,0.82); text-transform: uppercase;
        }

        .upload-zone {
            width: 100%; height: 160px; border: 1.5px dashed rgba(255,255,255,0.24);
            border-radius: var(--radius-lg); display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(255,255,255,0.06);
            cursor: pointer; overflow: hidden; position: relative;
        }
        .upload-zone svg { width: 44px; stroke: rgba(255,255,255,0.9); margin-bottom: 10px; }
        .upload-zone span { font-size: 14px; font-weight: 750; color: rgba(255,255,255,0.88); }
        #preview-img { position: absolute; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 5; }

        .category-trigger {
            width: 100%; padding: 14px; border: 1px solid rgba(255,255,255,0.16);
            border-radius: var(--radius-md); background: rgba(255,255,255,0.06);
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 800; font-size: 14px; color: rgba(255,255,255,0.9);
        }

        .category-list {
            margin-top: 8px; border: 1px solid rgba(255,255,255,0.14);
            border-radius: var(--radius-md); overflow: hidden; display: none;
            background: rgba(10, 12, 24, 0.9); backdrop-filter: blur(16px);
        }
        .category-list.show { display: block; }

        .radio-option {
            display: flex; align-items: center; padding: 13px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.10); cursor: pointer;
        }
        .radio-option input[type="radio"] {
            appearance: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.22);
            border-radius: 50%; margin-right: 12px; position: relative;
        }
        .radio-option input[type="radio"]:checked { border-color: var(--primary); background: var(--primary); }
        .radio-option input[type="radio"]:checked::after {
            content: ''; width: 8px; height: 8px; background: white; border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        input[type="text"], textarea {
            width: 100%; padding: 14px; border-radius: var(--radius-md);
            border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.06);
            color: #fff; font-weight: 650;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: var(--ring); }
        textarea { min-height: 180px; }

        .verify-box {
            display: flex; align-items: center; gap: 12px; margin: 14px 0;
            font-size: 14px; font-weight: 750; color: rgba(255,255,255,0.88);
            padding: 12px; border-radius: var(--radius-md); background: rgba(255,255,255,0.05);
        }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--primary); }

        .publish-btn {
            width: 100%; background: linear-gradient(135deg, var(--primary), #000);
            color: #fff; padding: 16px; border: 1px solid rgba(255,255,255,0.14);
            border-radius: 18px; font-size: 15px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
        }
        .publish-btn:active { transform: scale(0.98); }
        .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        #status-msg {
            text-align: center; margin-top: 12px; font-size: 13px; font-weight: 850;
            color: #fff; display: none; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 20px;
        }
        #file-input { display: none; }
    </style>
</head>
<body>

<div class="app">
    <header class="brandbar">
        <div class="brandname">Mnyilinga Digital</div>
        <div class="brandbadge">Admin Panel</div>
    </header>

    <main class="main glass">
        <section class="card">
            <h3>Create / Upload</h3>

            <div class="field-group">
                <label>Cover Image</label>
                <div class="upload-zone" onclick="document.getElementById('file-input').click()">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                    <span>Bonyeza ili kupakia picha</span>
                    <img id="preview-img" src="#" alt="Preview">
                </div>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <div class="field-group">
                <label>News Categories</label>
                <div class="category-trigger" id="catTrigger">
                    <span id="catSelected">Chagua category...</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                </div>
                <div class="category-list" id="catList">
                    <label class="radio-option"><input type="radio" name="category" value="Mahusiano"><span>Mahusiano</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Siasa"><span>Siasa</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Technology"><span>Technology</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Mapenzi"><span>Mapenzi</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Trending"><span>Trending</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Fashion"><span>Fashion</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Biashara"><span>Biashara</span></label>
                    <label class="radio-option"><input type="radio" name="category" value="Michezo"><span>Michezo</span></label>
                </div>
            </div>

            <div class="field-group">
                <label>Headline</label>
                <input type="text" id="headline" placeholder="Andika kichwa hapa...">
            </div>

            <div class="field-group">
                <label>Article</label>
                <textarea id="article" placeholder="Andika maelezo yote hapa..."></textarea>
            </div>

            <label class="verify-box">
                <input type="checkbox" id="verify">
                <span>Nimehakiki habari ni sahihi</span>
            </label>

            <button class="publish-btn" id="submitBtn" disabled onclick="handlePublish()">Push This Post</button>
            <div id="status-msg">Inashughulikia...</div>
        </section>
    </main>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const previewImg = document.getElementById('preview-img');
    const catTrigger = document.getElementById('catTrigger');
    const catList = document.getElementById('catList');
    const catSelected = document.getElementById('catSelected');
    const radios = document.querySelectorAll('input[name="category"]');
    const submitBtn = document.getElementById('submitBtn');
    const verifyCheckbox = document.getElementById('verify');
    const statusMsg = document.getElementById('status-msg');

    // 1. Image Preview
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (re) => { 
                previewImg.src = re.target.result; 
                previewImg.style.display = 'block'; 
            };
            reader.readAsDataURL(file);
        }
    };

    // 2. Category Dropdown
    catTrigger.onclick = () => catList.classList.toggle('show');

    radios.forEach(radio => {
        radio.onclick = () => {
            catSelected.innerText = radio.value;
            catList.classList.remove('show');
            catTrigger.style.borderColor = "rgba(220,38,38,0.5)";
        };
    });

    // 3. Validation
    verifyCheckbox.onchange = () => submitBtn.disabled = !verifyCheckbox.checked;

    // 4. Submit Logic
    async function handlePublish() {
        // Hizi ndizo kamba zinazounganisha kila kitu
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxRU38CN-Xnu7FOokZ7bzKXrxljegpDtpUPmRWCm06zBDEFfUl0ftbOlNUUNX_nAs5u/exec';
        const IMGBB_KEY = '65bd20fae1600fa1dad6725e9bda2c7a'; // Key yako ya herufi 32

        const file = fileInput.files[0];
        const category = catSelected.innerText;
        const headlineText = document.getElementById('headline').value.trim();
        const articleText = document.getElementById('article').value.trim();

        // Uhakiki wa mwisho
        if(!file || headlineText === "" || category === "Chagua category...") {
            alert("Tafadhali kamilisha fomu! (Hakikisha umechagua picha na category)"); 
            return;
        }

        submitBtn.disabled = true;
        statusMsg.style.display = 'block';
        statusMsg.innerText = "Inapakia picha (Step 1/2)...";

        try {
            // STEP 1: PAKIA PICHA IMGBB
            let fd = new FormData();
            fd.append("image", file);
            let imgRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {
                method: "POST",
                body: fd
            });
            let imgData = await imgRes.json();
            
            if(!imgData.success) {
                throw new Error("ImgBB Error: " + (imgData.error ? imgData.error.message : "Picha imekataliwa"));
            }

            statusMsg.innerText = "Inahifadhi kwenye Google Sheet (Step 2/2)...";

            // STEP 2: TUMA DATA GOOGLE SHEETS
            const payload = {
                "picha_url": imgData.data.url,
                "category": category,
                "headline": headlineText,
                "article": articleText
            };

            // Tunatumia mode: 'no-cors' na text/plain ili kupita salama bila CORS errors
            await fetch(GOOGLE_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            });

            // Kwa kuwa tunatumia no-cors, tunachukulia imefanikiwa ikiwa hakuna error hapo juu
            alert("Hongera Mnyilinga! Habari imetumbukia kwenye Sheet kikamilifu.");
            location.reload();

        } catch(e) {
            console.error(e);
            alert("Hitilafu: " + e.message);
            submitBtn.disabled = false;
            statusMsg.style.display = 'none';
        }
    }
</script>
</body>
</html>
