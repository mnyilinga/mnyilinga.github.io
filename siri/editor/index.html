<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnyilinga Precision v19.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>

<style>











#mcs-overlay{

position:fixed;
inset:0;
width:100%;
height:100vh;

background:radial-gradient(circle at top,#020617,#000);

display:grid;
place-items:center;

padding:20px;

z-index:9999999;

font-family:Inter,system-ui;

}

/* CARD */

.mcs-card{

width:100%;
max-width:340px;

padding:32px 26px;

background:rgba(15,23,42,.88);

border-radius:20px;

text-align:center;
color:white;

backdrop-filter:blur(18px);

border:1px solid rgba(0,194,255,.25);

box-shadow:
0 0 30px rgba(0,194,255,.15),
0 0 70px rgba(0,0,0,.85);

}

/* LOGO */

.mcs-logo{

width:58px;
margin-bottom:14px;

filter:drop-shadow(0 0 12px #00C2FF);

}

/* TITLE */

.mcs-title{

font-size:15px;
line-height:1.45;

margin-bottom:22px;

color:#cbd5f5;

}

.mcs-title span{

color:#00C2FF;
font-weight:700;

}

/* INPUT */

#mcs-pass{

width:100%;

padding:12px;

border-radius:10px;

border:1px solid rgba(0,194,255,.25);

background:#020617;

color:white;

text-align:center;

margin-bottom:14px;

font-size:14px;

}

#mcs-pass:focus{

outline:none;

border-color:#00C2FF;

box-shadow:0 0 12px #00C2FF;

}

/* BUTTON */

button{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:linear-gradient(90deg,#00C2FF,#6366F1);

color:white;

font-weight:700;

cursor:pointer;

font-size:14px;

transition:.25s;

}

button:hover{

transform:translateY(-2px);

box-shadow:0 0 12px #00C2FF;

}













:root{
--p-width:1080px;
--p-height:1350px;
--c-width:963px;
--radius:87px;
--gradient:linear-gradient(90deg,#5300f1 0%,#e91e63 100%);
}

body{
background:#050815;
color:#e5e7eb;
font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:16px;
min-height:100vh;
}

/* ADMIN PANEL */
.admin-panel{
width:100%;
max-width:520px;
background:radial-gradient(circle at 0 0,rgba(56,189,248,0.25),#020617 65%);
border-radius:24px;
padding:18px 16px 16px;
box-shadow:
 0 18px 45px rgba(15,23,42,0.95),
 0 0 0 1px rgba(15,23,42,0.9);
border:1px solid rgba(148,163,184,0.28);
backdrop-filter:blur(22px);
margin-bottom:22px;
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
gap:12px;
}

.admin-panel::before{
content:"";
position:absolute;
inset:-1px;
border-radius:inherit;
background:
 radial-gradient(circle at 0 0,rgba(56,189,248,0.35),transparent 55%),
 radial-gradient(circle at 100% 0,rgba(129,140,248,0.25),transparent 55%);
opacity:0.65;
mix-blend-mode:soft-light;
pointer-events:none;
}

.admin-title{
position:relative;
z-index:1;
font-size:20px;
font-weight:800;
letter-spacing:.06em;
text-transform:uppercase;
background:linear-gradient(120deg,#22d3ee,#a855f7,#f97316);
-webkit-background-clip:text;
background-clip:text;
color:transparent;
margin-bottom:2px;
}

.admin-subtitle{
position:relative;
z-index:1;
font-size:12px;
color:#9ca3af;
line-height:1.5;
}

.input-box{
position:relative;
z-index:1;
width:100%;
background:rgba(15,23,42,0.96);
border-radius:18px;
padding:2px;
border:1px solid rgba(148,163,184,0.5);
box-shadow:0 0 0 1px rgba(15,23,42,0.9);
transition:border-color .15s ease-out,box-shadow .15s ease-out,transform .08s ease-out;
}

.input-box:focus-within{
border-color:rgba(34,211,238,0.9);
box-shadow:
 0 0 0 1px rgba(34,211,238,0.5),
 0 0 30px rgba(34,211,238,0.55);
transform:translateY(-.5px);
}

textarea{
width:100%;
height:170px;
background:radial-gradient(circle at 0 0,#020617,#020617 70%);
border:none;
color:#e5e7eb;
font-size:15px;
resize:none;
outline:none;
padding:14px 14px 22px;
line-height:1.5;
border-radius:16px;
box-shadow:inset 0 0 0 1px rgba(15,23,42,0.9);
}

textarea::placeholder{
color:#64748b;
}

.btn-gen{
position:relative;
z-index:1;
width:100%;
margin-top:8px;
padding:13px 14px;
font-size:15px;
font-weight:700;
border:none;
border-radius:999px;
cursor:pointer;
background:
 linear-gradient(#020617,#020617) padding-box,
 linear-gradient(120deg,#22d3ee,#6366f1,#22c55e) border-box;
border:1px solid transparent;
color:#e5e7eb;
letter-spacing:.06em;
text-transform:none;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:
 0 16px 38px rgba(8,47,73,0.96),
 0 0 0 1px rgba(15,23,42,0.9);
transition:transform .08s ease-out,box-shadow .12s ease-out,filter .12s ease-out,background .15s ease-out;
}

.btn-gen-icon{
width:22px;
height:22px;
border-radius:999px;
border:1px solid rgba(56,189,248,0.8);
display:inline-flex;
align-items:center;
justify-content:center;
font-size:11px;
background:radial-gradient(circle at 0 0,rgba(56,189,248,0.45),rgba(15,23,42,1));
box-shadow:
 0 0 0 1px rgba(15,23,42,1),
 0 0 12px rgba(56,189,248,0.8);
}

.btn-gen-label{
font-size:14px;
text-transform:uppercase;
letter-spacing:.16em;
}

.btn-gen:hover{
transform:translateY(-1px);
filter:brightness(1.05);
box-shadow:
 0 18px 40px rgba(8,47,73,1),
 0 0 0 1px rgba(34,211,238,0.85);
}

.btn-gen:active{
transform:translateY(0);
filter:brightness(.97);
box-shadow:
 0 10px 24px rgba(8,47,73,0.9),
 0 0 0 1px rgba(34,211,238,0.8);
}

.btn-gen:disabled{
opacity:.7;
cursor:default;
transform:none;
box-shadow:
 0 10px 22px rgba(8,47,73,0.7),
 0 0 0 1px rgba(34,211,238,0.45);
}

/* POSTER AREA CONTAINER (UI ONLY) */
#output-area{
width:100%;
max-width:960px;
display:flex;
flex-direction:column;
gap:32px;
align-items:center;
padding-bottom:40px;
}

.poster-wrapper{
width:var(--p-width);
height:var(--p-height);
background-color:#ffffff;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:140px;
transform:scale(0.4);
transform-origin:top center;
margin-bottom:-750px;
}

.card-main{
width:var(--c-width);
background:#ffffff;
border-radius:var(--radius);
box-shadow:0 45px 110px rgba(0,0,0,0.22);
display:flex;
flex-direction:column;
overflow:hidden;
height:auto;
transition:0.3s;
}

.header{
width:100%;
height:320px;
background:var(--gradient);
display:flex;
justify-content:center;
align-items:center;
flex-shrink:0;
}

.header h1{
color:#fff;
font-size:54pt;
font-weight:700;
margin:0;
}

.body-box{
padding:70px 80px 100px 80px;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
text-align:center;
}

.story-text{
font-size:38pt;
line-height:1.4;
color:#111;
margin:0;
font-weight:700;
white-space:pre-wrap;
width:100%;
word-wrap:break-word;
}

.card-main.no-header .header{display:none;}
.card-main.no-header .body-box{padding-top:100px;}

.dl-btn{
position:relative;
background:
 linear-gradient(#020617,#020617) padding-box,
 linear-gradient(120deg,#22d3ee,#6366f1,#22c55e) border-box;
color:#e5e7eb;
padding:10px 22px;
border-radius:999px;
font-weight:700;
cursor:pointer;
border:1px solid transparent;
margin-top:4px;
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:13px;
letter-spacing:.16em;
text-transform:uppercase;
box-shadow:
 0 12px 28px rgba(15,23,42,0.96),
 0 0 0 1px rgba(15,23,42,0.9);
transition:transform .08s ease-out,box-shadow .12s ease-out,filter .12s ease-out,background .15s ease-out;
}

.dl-btn::before{
content:"⬇";
font-size:12px;
opacity:.9;
}

.dl-btn:hover{
transform:translateY(-1px);
filter:brightness(1.05);
box-shadow:
 0 16px 34px rgba(15,23,42,1),
 0 0 0 1px rgba(30,64,175,0.9);
}

.dl-btn:active{
transform:translateY(0);
filter:brightness(.97);
box-shadow:
 0 10px 22px rgba(15,23,42,0.9),
 0 0 0 1px rgba(30,64,175,0.85);
}

/* MOBILE */
@media(max-width:600px){
body{
padding:12px;
}
.admin-panel{
max-width:100%;
padding:16px 12px 14px;
border-radius:20px;
margin-bottom:18px;
}
.admin-title{
font-size:17px;
}
.admin-subtitle{
font-size:11px;
}
textarea{
height:190px;
font-size:14px;
}
.btn-gen{
font-size:14px;
padding:12px;
}
#output-area{
gap:26px;
}
}
</style>
</head>

<body>








<div id="mcs-overlay">

<div class="mcs-card">

<svg class="mcs-logo" viewBox="0 0 24 24">
<defs>
<linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00C2FF"/>
<stop offset="50%" stop-color="#6366F1"/>
<stop offset="100%" stop-color="#FF3B30"/>
</linearGradient>
</defs>
<path fill="url(#shieldGradient)" d="M12 1l9 4v6c0 5-3.8 9.7-9 11-5.2-1.3-9-6-9-11V5l9-4z"/>
</svg>

<h2 class="mcs-title">
This Website Protected by<br>
<span>Mnyilinga Cyber Security (MCS)</span>
</h2>

<div class="mcs-scan"></div>

<input id="mcs-pass" type="password" placeholder="Enter Security Code">

<button onclick="mcsUnlock()">ACCESS SYSTEM</button>

<p id="mcs-msg"></p>

</div>

</div>



















<div class="admin-panel">
<div class="admin-title">Mnyilinga Precision v19.0</div>
<div class="admin-subtitle">Bandika hadithi yako kisha gusa kitufe chini kuzalisha posters za HD.</div>
<div class="input-box">
<textarea id="txtIn" placeholder="Bandika hadithi hapa..."></textarea>
</div>
<button class="btn-gen" onclick="run()"><span class="btn-gen-icon">⚡</span><span class="btn-gen-label">Generate posters</span></button>
</div>

<div id="output-area"></div>

<script>
const TEXT_WIDTH = 800;
const BOX_MAX_H = 600;
const FONT_SIZE = 38;
const LINE_HEIGHT = 1.4;

function run(){
const raw=document.getElementById('txtIn').value;
const output=document.getElementById('output-area');
output.innerHTML='';
if(!raw.trim()) return;
const pages=calculatePages(raw);
pages.forEach((page,i)=>{
renderPoster(page,i+1);
});
}

function calculatePages(text){
const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');
ctx.font=`700 ${FONT_SIZE}pt 'Inter'`;
const words=text.split(/\s+/);
let pages=[];
let currentLines=[];
let currentLine="";
words.forEach(word=>{
let testLine=currentLine===""?word:currentLine+" "+word;
if(ctx.measureText(testLine).width>TEXT_WIDTH){
if((currentLines.length+1)*(FONT_SIZE*LINE_HEIGHT*1.33)>BOX_MAX_H){
pages.push([...currentLines]);
currentLines=[currentLine];
currentLine=word;
}else{
currentLines.push(currentLine);
currentLine=word;
}
}else{
currentLine=testLine;
}
});
if(currentLine) currentLines.push(currentLine);
if(currentLines.length>0) pages.push(currentLines);
return pages;
}

// DOWNLOAD FUNCTION WITH TIMESTAMP TO AVOID "Download file again" popup
function downloadImage(url,name){
const timestamp=new Date().toISOString().replace(/[:.]/g,'-'); // readable timestamp
const fullName=name.replace('.png',`_${timestamp}.png`);
const a=document.createElement("a");
a.href=url;
a.download=fullName;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
}

function renderPoster(data,n){
const group=document.createElement('div');
group.style.textAlign='center';
const frame=document.createElement('div');
frame.className='poster-wrapper';
frame.id=`frame-${n}`;
frame.innerHTML=`
<div class="card-main">
<div class="header"><h1>Siri za chumbani</h1></div>
<div class="body-box">
<p class="story-text">${data.join('\n')}</p>
</div>
</div>
`;
const btn=document.createElement('button');
btn.className='dl-btn';
btn.innerText=`DOWNLOAD POSTER ${n}`;
btn.onclick=()=>{
htmlToImage.toPng(frame,{
pixelRatio:3,
backgroundColor:"#ffffff",
width:1080,
height:1350,
cacheBust:true,
style:{transform:'scale(1)',transformOrigin:'top left'}
})
.then(url=>{downloadImage(url,`Mnyilinga_Poster_${n}.png`);})
.catch(err=>{alert("Download imegoma: "+err);});
};
group.appendChild(frame);
group.appendChild(btn);
document.getElementById('output-area').appendChild(group);
}
</script>

















<script>

const mcsCode="3714"
let attempts=0
let locked=false

function mcsUnlock(){

if(locked) return

let input=document.getElementById("mcs-pass").value
let msg=document.getElementById("mcs-msg")

if(input===mcsCode){

let overlay=document.getElementById("mcs-overlay")

overlay.classList.add("mcs-open")

setTimeout(()=>{
overlay.style.display="none"
},800)

}

else{

attempts++

msg.innerText="ACCESS DENIED"

if(attempts>=3){

locked=true
msg.innerText="SYSTEM LOCKED 20s"

setTimeout(()=>{
locked=false
attempts=0
msg.innerText=""
},20000)

}

}

}

document.getElementById("mcs-pass").addEventListener("keyup",function(e){
if(e.key==="Enter") mcsUnlock()
})

</script>







</body>
