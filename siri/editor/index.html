<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnyilinga Precision v18.0 - Professional Fit</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>

    <style>
        :root {
            /* Vipimo vya Poster vipo FIXED kama ulivyoelekeza */
            --p-width: 1080px;
            --p-height: 1350px;
            --c-width: 963px;
            --radius: 87px;
            --gradient: linear-gradient(90deg, #5300f1 0%, #e91e63 100%);
        }

        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        .admin-panel {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 20px;
            width: 95%;
            max-width: 800px;
            margin-bottom: 50px;
            border: 1px solid #333;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #00ff88;
            border: 1px solid #444;
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            outline: none;
        }

        .btn-gen {
            width: 100%;
            margin-top: 15px;
            padding: 18px;
            background: #00d1ff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
        }

        #output-area {
            display: flex;
            flex-direction: column;
            gap: 50px;
            align-items: center;
        }

        /* Hapa ndipo tunahakikisha size ya poster haibadiliki */
        .poster-wrapper {
            width: var(--p-width);
            height: var(--p-height);
            background-color: #ffffff; /* Background nyeupe ya poster yote */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Inahakikisha kadi inabaki juu kabisa */
            padding-top: 140px; /* Nafasi ya kadi kutokea juu ya poster */
            transform: scale(0.4);
            transform-origin: top center;
            margin-bottom: -750px;
        }

        .card-main {
            width: var(--c-width);
            background: #ffffff;
            border-radius: var(--radius);
            /* Kivuli kimeimarishwa kulingana na picha zako */
            box-shadow: 0 45px 110px rgba(0, 0, 0, 0.22);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: auto; /* Kadi itajifunga yenyewe (shrink) hapa */
            transition: 0.3s;
        }

        .header {
            width: 100%;
            height: 320px;
            background: var(--gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 { color: #fff; font-size: 54pt; font-weight: 700; margin: 0; }

        .body-box {
            padding: 70px 80px 100px 80px; /* Padding ya chini inatengeneza muonekano natural */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
        }

        .story-text {
            font-size: 38pt;
            line-height: 1.4;
            color: #111;
            margin: 0;
            font-weight: 700;
            white-space: pre-wrap;
            width: 100%;
            word-wrap: break-word;
        }

        /* Ikiwa ni ukurasa wa mwisho na haina header */
        .card-main.no-header .header { display: none; }
        .card-main.no-header .body-box { padding-top: 100px; }

        .dl-btn {
            background: #ff0055;
            color: white;
            padding: 15px 45px;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            border: none;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h2 style="color:#00d1ff; margin-top:0;">Mnyilinga Precision v18.0</h2>
        <textarea id="txtIn" placeholder="Weka hadithi hapa..."></textarea>
        <button class="btn-gen" onclick="run()">GENERATE POSTERS</button>
    </div>

    <div id="output-area"></div>

    <script>
        const TEXT_WIDTH = 800;
        const BOX_MAX_H = 600; // Urefu wa maandishi kabla ya kadi mpya
        const FONT_SIZE = 38;
        const LINE_HEIGHT = 1.4;

        function run() {
            const raw = document.getElementById('txtIn').value;
            const output = document.getElementById('output-area');
            output.innerHTML = '';
            if(!raw.trim()) return;

            const pages = calculatePages(raw);
            pages.forEach((page, i) => {
                // Kwa sasa tunaweka header kwenye kadi zote, au unaweza kubadili logic hapa
                renderPoster(page, i + 1);
            });
        }

        function calculatePages(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.font = `700 ${FONT_SIZE}pt 'Inter'`;

            const words = text.split(/\s+/);
            let pages = [];
            let currentLines = [];
            let currentLine = "";

            words.forEach(word => {
                let testLine = currentLine === "" ? word : currentLine + " " + word;
                if (ctx.measureText(testLine).width > TEXT_WIDTH) {
                    if ((currentLines.length + 1) * (FONT_SIZE * LINE_HEIGHT * 1.33) > BOX_MAX_H) {
                        pages.push([...currentLines]);
                        currentLines = [currentLine];
                        currentLine = word;
                    } else {
                        currentLines.push(currentLine);
                        currentLine = word;
                    }
                } else {
                    currentLine = testLine;
                }
            });
            if (currentLine) currentLines.push(currentLine);
            if (currentLines.length > 0) pages.push(currentLines);
            return pages;
        }

        function renderPoster(data, n) {
            const group = document.createElement('div');
            group.style.textAlign = 'center';

            const frame = document.createElement('div');
            frame.className = 'poster-wrapper';
            frame.id = `frame-${n}`;
            frame.innerHTML = `
                <div class="card-main">
                    <div class="header"><h1>Siri za chumbani</h1></div>
                    <div class="body-box">
                        <p class="story-text">${data.join('\n')}</p>
                    </div>
                </div>
            `;

            const btn = document.createElement('button');
            btn.className = 'dl-btn';
            btn.innerText = `DOWNLOAD POSTER ${n}`;
            btn.onclick = () => {
                htmlToImage.toPng(frame, { 
                    pixelRatio: 2, 
                    backgroundColor: "#ffffff",
                    width: 1080,
                    height: 1350,
                    style: { transform: 'scale(1)', marginBottom: '0' }
                })
                .then(url => {
                    const l = document.createElement('a');
                    l.download = `Mnyilinga_Poster_${n}.png`;
                    l.href = url;
                    l.click();
                });
            };

            group.appendChild(frame);
            group.appendChild(btn);
            document.getElementById('output-area').appendChild(group);
        }
    </script>
</body>
</html>
