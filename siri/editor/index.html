<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnyilinga Precision v18.0</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>

<style>
:root{
--p-width:1080px;
--p-height:1350px;
--c-width:963px;
--radius:87px;
--gradient:linear-gradient(90deg,#5300f1 0%,#e91e63 100%);
}

body{
background:#0a0a0a;
color:#fff;
font-family:'Inter',sans-serif;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* ADMIN PANEL */

.admin-panel{
width:100%;
max-width:900px;
background:linear-gradient(145deg,#141414,#1d1d1d);
border-radius:25px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.7);
border:1px solid rgba(255,255,255,0.08);
margin-bottom:40px;
}

.admin-title{
font-size:26px;
font-weight:800;
margin-bottom:15px;
background:linear-gradient(90deg,#00d1ff,#00ffae);
-webkit-background-clip:text;
color:transparent;
}

.input-box{
width:100%;
background:#0b0b0b;
border-radius:18px;
padding:10px;
border:1px solid #333;
}

textarea{
width:100%;
height:160px;
background:transparent;
border:none;
color:#00ff88;
font-size:18px;
resize:none;
outline:none;
padding:15px;
line-height:1.5;
}

textarea::placeholder{
color:#666;
}

.btn-gen{
width:100%;
margin-top:15px;
padding:18px;
font-size:18px;
font-weight:900;
border:none;
border-radius:14px;
cursor:pointer;
background:linear-gradient(90deg,#00d1ff,#00ffa2);
color:#000;
transition:0.2s;
}

.btn-gen:active{
transform:scale(0.97);
}

/* POSTER AREA */

#output-area{
display:flex;
flex-direction:column;
gap:50px;
align-items:center;
}

.poster-wrapper{
width:var(--p-width);
height:var(--p-height);
background-color:#ffffff;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:140px;
transform:scale(0.4);
transform-origin:top center;
margin-bottom:-750px;
}

.card-main{
width:var(--c-width);
background:#ffffff;
border-radius:var(--radius);
box-shadow:0 45px 110px rgba(0,0,0,0.22);
display:flex;
flex-direction:column;
overflow:hidden;
height:auto;
transition:0.3s;
}

.header{
width:100%;
height:320px;
background:var(--gradient);
display:flex;
justify-content:center;
align-items:center;
flex-shrink:0;
}

.header h1{
color:#fff;
font-size:54pt;
font-weight:700;
margin:0;
}

.body-box{
padding:70px 80px 100px 80px;
display:flex;
flex-direction:column;
justify-content:flex-start;
align-items:center;
text-align:center;
}

.story-text{
font-size:38pt;
line-height:1.4;
color:#111;
margin:0;
font-weight:700;
white-space:pre-wrap;
width:100%;
word-wrap:break-word;
}

.card-main.no-header .header{display:none;}
.card-main.no-header .body-box{padding-top:100px;}

.dl-btn{
background:#ff0055;
color:white;
padding:15px 45px;
border-radius:50px;
font-weight:900;
cursor:pointer;
border:none;
margin-top:25px;
}

/* MOBILE */

@media(max-width:600px){

body{
padding:12px;
}

.admin-panel{
padding:18px;
}

.admin-title{
font-size:22px;
}

textarea{
height:180px;
font-size:17px;
}

.btn-gen{
font-size:17px;
padding:16px;
}

}
</style>
</head>

<body>

<div class="admin-panel">

<div class="admin-title">Mnyilinga Precision v18.0</div>

<div class="input-box">
<textarea id="txtIn" placeholder="Bandika hadithi hapa..."></textarea>
</div>

<button class="btn-gen" onclick="run()">GENERATE POSTERS</button>

</div>

<div id="output-area"></div>

<script>

const TEXT_WIDTH = 800;
const BOX_MAX_H = 600;
const FONT_SIZE = 38;
const LINE_HEIGHT = 1.4;

function run(){

const raw=document.getElementById('txtIn').value;
const output=document.getElementById('output-area');
output.innerHTML='';

if(!raw.trim()) return;

const pages=calculatePages(raw);

pages.forEach((page,i)=>{
renderPoster(page,i+1);
});

}

function calculatePages(text){

const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');

ctx.font=`700 ${FONT_SIZE}pt 'Inter'`;

const words=text.split(/\s+/);

let pages=[];
let currentLines=[];
let currentLine="";

words.forEach(word=>{

let testLine=currentLine===""?word:currentLine+" "+word;

if(ctx.measureText(testLine).width>TEXT_WIDTH){

if((currentLines.length+1)*(FONT_SIZE*LINE_HEIGHT*1.33)>BOX_MAX_H){

pages.push([...currentLines]);
currentLines=[currentLine];
currentLine=word;

}else{

currentLines.push(currentLine);
currentLine=word;

}

}else{

currentLine=testLine;

}

});

if(currentLine) currentLines.push(currentLine);
if(currentLines.length>0) pages.push(currentLines);

return pages;

}

function downloadImage(url,name){

const a=document.createElement("a");
a.href=url;
a.download=name;

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}

function renderPoster(data,n){

const group=document.createElement('div');
group.style.textAlign='center';

const frame=document.createElement('div');
frame.className='poster-wrapper';
frame.id=`frame-${n}`;

frame.innerHTML=`

<div class="card-main">

<div class="header"><h1>Siri za chumbani</h1></div>

<div class="body-box">
<p class="story-text">${data.join('\n')}</p>
</div>

</div>

`;

const btn=document.createElement('button');

btn.className='dl-btn';
btn.innerText=`DOWNLOAD POSTER ${n}`;

btn.onclick=()=>{

htmlToImage.toPng(frame,{
pixelRatio:3,
backgroundColor:"#ffffff",
width:1080,
height:1350,
cacheBust:true,
style:{
transform:'scale(1)',
transformOrigin:'top left'
}
})

.then(url=>{
downloadImage(url,`Mnyilinga_Poster_${n}.png`);
})

.catch(err=>{
alert("Download imegoma: "+err);
});

};

group.appendChild(frame);
group.appendChild(btn);

document.getElementById('output-area').appendChild(group);

}

</script>

</body>
</html>
