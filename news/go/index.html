<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnyilinga News | Breaking News and Stories</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">










<style>



/* --- COLOR SYSTEM & VARIABLES --- */
:root {
    --bg-dark: #020617;
    --card-bg: #0F172A;
    --accent-red: #FF3B30;
    --accent-cyan: #00C2FF;
    --text-primary: #F8FAFC;
    --text-secondary: #94A3B8;
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-bg: rgba(2, 6, 23, 0.85);
}

/* --- RESET & BASE --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
}

.container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

.hidden {
    display: none !important;
}

.accent-cyan {
    color: var(--accent-cyan);
}

/* --- HEADER & NAVIGATION --- */
.glass-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--glass-border);
    padding: 15px 0;
}

.header-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    max-width: 1200px;
    margin: 0 auto;
}

.logo h1 {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
}

/* Hamburger Icon */
.hamburger {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 101;
}

.hamburger span {
    display: block;
    width: 25px;
    height: 3px;
    background-color: var(--text-primary);
    border-radius: 3px;
    transition: 0.3s;
}

/* Mobile Drawer */
.mobile-menu {
    position: fixed;
    top: 0;
    right: -100%;
    width: 80%;
    max-width: 300px;
    height: 100vh;
    background-color: var(--card-bg);
    border-left: 1px solid var(--glass-border);
    padding-top: 80px;
    transition: right 0.4s cubic-bezier(0.77, 0, 0.175, 1);
    z-index: 99;
    box-shadow: -10px 0 30px rgba(0,0,0,0.5);
}

.mobile-menu.active {
    right: 0;
}

.nav-links {
    list-style: none;
    padding: 20px;
}

.nav-links li {
    margin-bottom: 20px;
}

.nav-links a {
    color: var(--text-primary);
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    display: block;
    transition: color 0.2s;
}

.nav-links a:hover, .nav-links a.active {
    color: var(--accent-cyan);
}

/* --- BREAKING NEWS TICKER --- */
.ticker-wrap {
    display: flex;
    background-color: var(--card-bg);
    border-bottom: 1px solid var(--glass-border);
    height: 40px;
    overflow: hidden;
}

.ticker-label {
    background-color: var(--accent-red);
    color: #fff;
    font-weight: 700;
    font-size: 12px;
    padding: 0 15px;
    display: flex;
    align-items: center;
    text-transform: uppercase;
    z-index: 2;
    box-shadow: 5px 0 15px rgba(255, 59, 48, 0.3);
}

.ticker {
    flex-grow: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
}

.ticker-content {
    white-space: nowrap;
    animation: ticker 25s linear infinite;
    font-size: 14px;
    color: var(--text-secondary);
}

.ticker-content span {
    margin-right: 40px;
}

@keyframes ticker {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* --- HERO SECTION --- */
.hero-section {
    padding: 30px 0;
}

.hero-card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--glass-border);
}

.hero-img-wrap {
    width: 100%;
    height: 60vh;
    min-height: 400px;
    position: relative;
}

.hero-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
}

.hero-card:hover img {
    transform: scale(1.05);
}

.hero-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    background: linear-gradient(to top, rgba(2,6,23, 1) 0%, rgba(2,6,23, 0) 100%);
    padding: 40px 20px 20px;
}

.category-badge {
    background-color: var(--accent-cyan);
    color: var(--bg-dark);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 10px;
    text-transform: uppercase;
}

.hero-title {
    font-size: 28px;
    line-height: 1.2;
    margin-bottom: 10px;
    font-weight: 700;
}

.hero-meta {
    font-size: 13px;
    color: var(--text-secondary);
}

/* --- NEWS GRID (CARDS) --- */
.latest-news-section {
    padding: 20px 0 60px;
}

.section-header {
    margin-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
    padding-bottom: 10px;
}

.news-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
}

@media (min-width: 768px) {
    .news-grid { grid-template-columns: repeat(2, 1fr); }
    .hero-title { font-size: 36px; }
}

@media (min-width: 1024px) {
    .news-grid { grid-template-columns: repeat(3, 1fr); }
}

.news-card {
    background-color: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
}

.news-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 194, 255, 0.1);
    border-color: rgba(0, 194, 255, 0.3);
}

.card-img {
    width: 100%;
    height: 200px;
    overflow: hidden;
}

.card-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
}

.news-card:hover .card-img img {
    transform: scale(1.08);
}

.card-content {
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
}

.card-title {
    font-size: 18px;
    font-weight: 600;
    margin: 10px 0;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-preview {
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 15px;
    flex-grow: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--glass-border);
    padding-top: 15px;
    font-size: 12px;
    color: var(--text-secondary);
}

/* --- FULL ARTICLE VIEW --- */
#article-view {
    padding: 40px 0 80px;
}

.back-btn {
    background: var(--card-bg);
    color: var(--accent-cyan);
    border: 1px solid var(--glass-border);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-bottom: 30px;
    transition: 0.3s;
}

.back-btn:hover {
    background: var(--glass-border);
}

.article-header {
    margin-bottom: 30px;
}

.article-title {
    font-size: 32px;
    font-weight: 900;
    margin: 15px 0;
    line-height: 1.2;
}

.article-meta {
    color: var(--text-secondary);
    display: flex;
    gap: 15px;
    align-items: center;
}

.article-image {
    width: 100%;
    height: auto;
    max-height: 500px;
    object-fit: cover;
    border-radius: 14px;
    margin-bottom: 30px;
    border: 1px solid var(--glass-border);
}

.article-body {
    font-size: 18px;
    line-height: 1.8;
    color: var(--text-primary);
}

.article-body p {
    margin-bottom: 20px;
}

/* --- LOADER --- */
.loader {
    width: 40px;
    height: 40px;
    border: 4px solid var(--glass-border);
    border-top: 4px solid var(--accent-cyan);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 50px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}







</style>











</head>
<body>

    <header class="glass-header">
        <div class="header-container">
            <div class="logo">
                <h1>Mnyilinga<span class="accent-cyan">News</span></h1>
            </div>
            <button class="hamburger" id="menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <nav class="mobile-menu" id="mobile-menu">
        <ul class="nav-links">
            <li><a href="#" class="active">Home</a></li>
            <li><a href="#">World</a></li>
            <li><a href="#">Technology</a></li>
            <li><a href="#">Business</a></li>
            <li><a href="#">Sports</a></li>
            <li><a href="#">Entertainment</a></li>
            <li><a href="#">Health</a></li>
        </ul>
    </nav>

    <div class="ticker-wrap">
        <div class="ticker-label">BREAKING</div>
        <div class="ticker">
            <div class="ticker-content" id="ticker-content">
                Loading latest headlines...
            </div>
        </div>
    </div>

    <main id="home-view">
        <section class="hero-section">
            <div class="container" id="hero-container">
                <div class="loader"></div>
            </div>
        </section>

        <section class="latest-news-section">
            <div class="container">
                <div class="section-header">
                    <h2>Latest <span class="accent-cyan">Stories</span></h2>
                </div>
                <div class="news-grid" id="news-grid">
                    </div>
            </div>
        </section>
    </main>

    <main id="article-view" class="hidden">
        <div class="container">
            <button class="back-btn" id="back-btn">← Back to News</button>
            <article class="full-article" id="full-article-container">
                </article>
        </div>
    </main>

    <script src="script.js"></script>












<script>

// --- CONFIGURATION ---
// REPLACE THIS STRING WITH YOUR ACTUAL GOOGLE APPS SCRIPT WEB APP URL
const API_URL = "https://script.google.com/macros/s/AKfycbxRU38CN-Xnu7FOokZ7bzKXrxljegpDtpUPmRWCm06zBDEFfUl0ftbOlNUUNX_nAs5u/exec"; 

// --- STATE ---
let newsData = [];

// --- DOM ELEMENTS ---
const menuBtn = document.getElementById('menu-btn');
const mobileMenu = document.getElementById('mobile-menu');
const homeView = document.getElementById('home-view');
const articleView = document.getElementById('article-view');
const heroContainer = document.getElementById('hero-container');
const newsGrid = document.getElementById('news-grid');
const tickerContent = document.getElementById('ticker-content');
const fullArticleContainer = document.getElementById('full-article-container');
const backBtn = document.getElementById('back-btn');

// --- EVENT LISTENERS ---
menuBtn.addEventListener('click', toggleMenu);
backBtn.addEventListener('click', closeArticle);

// --- INITIALIZATION ---
document.addEventListener('DOMContentLoaded', fetchNews);

// --- MENU LOGIC ---
function toggleMenu() {
    mobileMenu.classList.toggle('active');
    // Animate hamburger to X
    const spans = menuBtn.querySelectorAll('span');
    if (mobileMenu.classList.contains('active')) {
        spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
        spans[1].style.opacity = '0';
        spans[2].style.transform = 'rotate(-45deg) translate(6px, -6px)';
    } else {
        spans[0].style.transform = 'none';
        spans[1].style.opacity = '1';
        spans[2].style.transform = 'none';
    }
}

// --- DATA FETCHING ---
async function fetchNews() {
    try {
        // Safety check to prevent crashing if URL isn't pasted yet
        if(API_URL === "PASTE_WEBAPP_URL_HERE") {
            throw new Error("API URL not configured.");
        }

        const response = await fetch(API_URL);
        const data = await response.json();
        
        // Sort newest first (assuming timestamp format YYYY-MM-DD allows string comparison)
        newsData = data.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        
        renderUI();
    } catch (error) {
        console.error("Error fetching news:", error);
        // Display graceful error state
        heroContainer.innerHTML = `
            <div style="text-align: center; padding: 50px;">
                <h2 class="accent-red">Connection Error</h2>
                <p style="color: var(--text-secondary); margin-top: 10px;">
                    Failed to load news. Please check your API URL or internet connection.
                </p>
            </div>`;
        tickerContent.innerHTML = "Unable to load breaking news at this time.";
    }
}

// --- RENDER LOGIC ---
function renderUI() {
    if (!newsData || newsData.length === 0) return;

    // 1. Update Ticker
    updateTicker();

    // 2. Render Hero (First Article)
    renderHero(newsData[0]);

    // 3. Render Grid (Remaining Articles)
    renderGrid(newsData.slice(1));
}

function updateTicker() {
    // Grab the top 5 headlines for the ticker
    const topHeadlines = newsData.slice(0, 5).map(news => `<span>⚡ ${news.headline}</span>`);
    tickerContent.innerHTML = topHeadlines.join(" ");
}

function renderHero(article) {
    const previewText = article.article.substring(0, 150) + "...";
    
    heroContainer.innerHTML = `
        <div class="hero-card" onclick="openArticle('${article.headline.replace(/'/g, "\\'")}')">
            <div class="hero-img-wrap">
                <img src="${article.picha_url}" alt="Hero Image" loading="lazy">
            </div>
            <div class="hero-overlay">
                <span class="category-badge">${article.category}</span>
                <h2 class="hero-title">${article.headline}</h2>
                <p class="card-preview">${previewText}</p>
                <div class="hero-meta">${formatDate(article.timestamp)}</div>
            </div>
        </div>
    `;
}

function renderGrid(articles) {
    newsGrid.innerHTML = ""; // Clear existing

    articles.forEach(article => {
        const previewText = article.article.substring(0, 100) + "...";
        
        const card = document.createElement('div');
        card.className = 'news-card';
        // Pass headline securely as an identifier
        card.onclick = () => openArticle(article.headline); 

        card.innerHTML = `
            <div class="card-img">
                <img src="${article.picha_url}" alt="${article.category}" loading="lazy">
            </div>
            <div class="card-content">
                <span class="category-badge">${article.category}</span>
                <h3 class="card-title">${article.headline}</h3>
                <p class="card-preview">${previewText}</p>
                <div class="card-footer">
                    <span>Mnyilinga Desk</span>
                    <span>${formatDate(article.timestamp)}</span>
                </div>
            </div>
        `;
        newsGrid.appendChild(card);
    });
}

// --- VIEW NAVIGATION (SPA) ---
function openArticle(headline) {
    // Find the specific article object
    const article = newsData.find(item => item.headline === headline);
    if (!article) return;

    // Format paragraphs for article body (assuming pure text, splitting by double newline)
    const formattedBody = article.article.split('\n\n').map(p => `<p>${p}</p>`).join('');

    // Populate article view
    fullArticleContainer.innerHTML = `
        <header class="article-header">
            <span class="category-badge" style="background: var(--accent-red); color: white;">${article.category}</span>
            <h1 class="article-title">${article.headline}</h1>
            <div class="article-meta">
                <span>By Mnyilinga Desk</span> • 
                <span>${formatDate(article.timestamp)}</span>
            </div>
        </header>
        <img src="${article.picha_url}" alt="${article.headline}" class="article-image">
        <div class="article-body">
            ${formattedBody}
        </div>
    `;

    // Switch views
    homeView.classList.add('hidden');
    articleView.classList.remove('hidden');
    
    // Scroll to top
    window.scrollTo(0, 0);
}

function closeArticle() {
    articleView.classList.add('hidden');
    homeView.classList.remove('hidden');
    window.scrollTo(0, 0);
}

// --- UTILITIES ---
function formatDate(dateString) {
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    const date = new Date(dateString);
    // If invalid date, return the original string safely
    return isNaN(date) ? dateString : date.toLocaleDateString('en-US', options);
}

</script>
